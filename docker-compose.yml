# DVD Rental — Full-stack Docker Compose
#
# 用法:
#   完整启动（含内置 PostgreSQL）:
#     docker compose up -d
#
#   使用宿主机已有的 PostgreSQL（不启动 db 服务）:
#     docker compose --profile external-db up -d
#
#   只构建镜像:
#     docker compose build
#
#   查看日志:
#     docker compose logs -f backend
#     docker compose logs -f frontend

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: dvdrental_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-dvdrental}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"   # 5433 避免与宿主机 5432 冲突
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 首次启动（pgdata 为空时）自动执行初始化脚本
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dvdrental}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dvdrental_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      POSTGRES_HOST:     db          # 容器网络内固定使用服务名，不读宿主机 .env
      POSTGRES_PORT:     "5432"
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-dvdrental}
      DEBUG:             ${DEBUG:-false}
      ALLOWED_ORIGINS:   >-
        ["http://localhost","http://localhost:80","http://127.0.0.1",
         "http://localhost:${FRONTEND_PORT:-80}"]
      GITHUB_CLIENT_ID:     ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      # Keycloak IDP
      # ISSUER stays as localhost (matches what's inside the tokens)
      # JWKS_URL uses host.docker.internal so the container can reach the host
      KEYCLOAK_ISSUER:   http://localhost:8090/realms/dvd-rental
      KEYCLOAK_JWKS_URL: http://host.docker.internal:8090/realms/dvd-rental/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-dvd-rental-api}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Vue 3 Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ../DVDRentalAdmin
      dockerfile: Dockerfile
    container_name: dvdrental_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
    name: dvdrental_pgdata
