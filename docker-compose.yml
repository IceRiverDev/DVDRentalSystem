# DVD Rental — Full-stack Docker Compose
#
# 用法:
#   完整启动（含内置 PostgreSQL + Keycloak）:
#     docker compose up -d
#
#   使用宿主机已有的 PostgreSQL（不启动 db 服务）:
#     docker compose --profile external-db up -d
#
#   只构建镜像:
#     docker compose build
#
#   查看日志:
#     docker compose logs -f backend
#     docker compose logs -f frontend
#     docker compose logs -f keycloak
#
# Keycloak 说明:
#   - 首次启动时自动导入 docker/keycloak/dvd-rental-realm.json（realm、clients、roles、测试用户）
#   - Realm 配置持久化在 keycloak_data volume（H2 数据库），重启后不会重复导入
#   - 管理控制台: http://localhost:8090  admin / ${KEYCLOAK_ADMIN_PASSWORD:-admin}
#   - 测试账号:   testuser / test123

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: dvdrental_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-dvdrental}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"   # 5433 避免与宿主机 5432 冲突
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 首次启动（pgdata 为空时）自动执行初始化脚本
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dvdrental}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Keycloak IDP ────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: dvdrental_keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN:           ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD:  ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT:             8080
      # 使 token 中的 issuer 与浏览器访问的地址一致（localhost:8090）
      KC_HOSTNAME_URL:          http://localhost:${KEYCLOAK_PORT:-8090}
      KC_HOSTNAME_STRICT:       "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED:          "true"
      # 使用 PostgreSQL 替代默认 H2（稳定、持久、无文件锁问题）
      KC_DB:                    postgres
      KC_DB_URL:                jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME:           ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD:           ${POSTGRES_PASSWORD:-postgres}
      KC_HEALTH_ENABLED:        "true"
    ports:
      - "${KEYCLOAK_PORT:-8090}:8080"
      - "${KEYCLOAK_ADMIN_PORT:-9000}:9000"   # 管理端口（health check）
    volumes:
      # Realm 导入文件（首次启动时自动导入；realm 已存在时跳过）
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Keycloak 26+: health endpoint is on management port 9000 (not 8080)
      # distroless image has no curl/wget; use bash TCP socket
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dvdrental_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      POSTGRES_HOST:     db          # 容器网络内固定使用服务名，不读宿主机 .env
      POSTGRES_PORT:     "5432"
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-dvdrental}
      DEBUG:             ${DEBUG:-false}
      ALLOWED_ORIGINS:   >-
        ["http://localhost","http://localhost:80","http://127.0.0.1",
         "http://localhost:${FRONTEND_PORT:-80}"]
      # Keycloak IDP
      # ISSUER 与 token 中的 iss claim 一致（浏览器视角的 URL）
      # JWKS_URL 使用容器内网服务名，避免出容器再绕回宿主机
      KEYCLOAK_ISSUER:    http://localhost:${KEYCLOAK_PORT:-8090}/realms/dvd-rental
      KEYCLOAK_JWKS_URL:  http://keycloak:8080/realms/dvd-rental/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-dvd-rental-api}
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Vue 3 Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ../DVDRentalAdmin
      dockerfile: Dockerfile
    container_name: dvdrental_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
    name: dvdrental_pgdata
